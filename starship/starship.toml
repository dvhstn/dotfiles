format = """
$directory\
$git_branch\
$git_status\
$fill\
$java\
$aws\
$docker_context\
$cmd_duration\
$line_break\
$character\
"""

add_newline = true
palette = "nord"

[character]
success_symbol = '[➜](teal)'
error_symbol = '[➜](red)'

[fill]
symbol = ' '

[directory]
style = 'bold fg:yellow'

[git_branch]
style = 'fg:teal'
symbol = ' '

[git_status]
style = 'fg:red'
format = '([$all_status$ahead_behind]($style) )'

[aws]
symbol = ' '
style = 'orange'
format = '[$symbol($profile )(\[$duration\] )]($style)'

[docker_context]
symbol = ' '
style = 'fg:#06969A'
format = '[$symbol]($style) $path'
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
detect_extensions = ['Dockerfile']

[java]
symbol = '☕ '
style = 'fg:red'


[palettes.nord]
dark_blue = '#5E81AC'
blue = '#81A1C1'
teal = '#88C0D0'
red = '#BF616A'
orange = '#D08770'
green = '#A3BE8C'
yellow = '#EBCB8B'
purple = '#B48EAD'
gray = '#434C5E'
black = '#2E3440'
white='#D8DEE9'

