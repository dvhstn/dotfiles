format = """
$directory\
$git_branch\
$git_status\
$fill\
$java\
$aws\
$docker\
$cmd_duration\
$line_break\
$character\
"""
add_newline = true
palette = 'nord'

[fill]
symbol = ' '

[directory]
style = 'teal'

[git_branch]
symbol = ' '
style = 'yellow'

[aws]
symbol = ' '
style = 'orange'

[docker_context]
symbol = ' '
style = 'blue'

[palettes.coolnight]
dark_blue = '#010B17'
blue      = '#1376F8'
teal      = '#52FFCF'
red       = '#FF2600'
orange    = '#FCF4AD'
green     = '#38FF9C'
yellow    = '#FFF383'
purple    = '#C792EA'
gray      = '#62686C'
black     = '#000000'
white     = '#EBDDF4'

[palettes.nord]
dark_blue = '#5E81AC'
blue      = '#81A1C1'
teal      = '#88C0D0'
red       = '#BF616A'
orange    = '#D08770'
green     = '#A3BE8C'
yellow    = '#EBCB8B'
purple    = '#B48EAD'
gray      = '#434C5E'
black     = '#2E3440'
white      ='#D8DEE9'
