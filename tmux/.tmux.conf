## Colour Overrides
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

## Window Ordering
set -g renumber-windows on  # keep numbering sequential
set -g base-index 1
set -g pane-base-index 1

## Reload TMUX config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

## Change Prefix
unbind C-b
set -g prefix `
bind ` send-prefix

## Mouse Support
set -g mouse on

